<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API CRUD - Kategóriák</title>
    <style>
        /* Főoldalról áthozott stílusok */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f4f7f6; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #2c3e50; color: #ecf0f1; text-align: center; padding: 2rem 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 2.2rem; }
        nav { background-color: #34495e; display: flex; justify-content: center; flex-wrap: wrap; padding: 0.8rem; }
        nav a { color: white; text-decoration: none; padding: 10px 20px; margin: 5px; border-radius: 5px; transition: background-color 0.3s ease; font-weight: bold; }
        nav a:hover, nav a.active { background-color: #e74c3c; }
        main { flex: 1; padding: 2rem; display: flex; flex-direction: column; align-items: center; }
        
        /* Fetch API specifikus stílusok */
        .crud-container { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        ul { list-style-type: none; padding: 0; width: 100%; }
        li { margin: 5px 0; padding: 10px; background: #eee; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        button { margin-left: 5px; cursor: pointer; padding: 5px 10px; border: none; border-radius: 3px; background-color: #3498db; color: white; font-weight: bold;}
        button:hover { background-color: #2980b9; }
        input[type="text"] { padding: 8px; width: calc(100% - 100px); border: 1px solid #ccc; border-radius: 4px; margin-bottom: 15px;}
    </style>
</head>
<body>

    <header>
        <h1>Web programozás-1 Előadás Házi feladat</h1>
    </header>

    <nav>
        <a href="index.html">Főoldal</a>
        <a href="javascript.html">JavaScript CRUD</a>
        <a href="react.html">React CRUD</a>
        <a href="spa.html">SPA (Játékok)</a>
        <a href="fetchapi.html" class="active">Fetch API</a>
        <a href="axios.html">Axios</a>
        <a href="oojs.html">OOJS</a>
    </nav>

    <main>
        <div class="crud-container">
            <h2>Kategóriák Kezelése (Fetch API)</h2>
            <div>
                <input type="text" id="kategoriaNev" placeholder="Új kategória neve">
                <button onclick="addKategoria()" style="background-color: #27ae60;">Hozzáadás</button>
            </div>
            <ul id="lista"></ul>
        </div>
    </main>

    <script>
        const API_URL = 'api.php';

        async function loadData() {
            const res = await fetch(API_URL);
            const data = await res.json();
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            data.forEach(item => {
                lista.innerHTML += `
                    <li>
                        <span id="text-${item.id}">${item.nev}</span>
                        <div>
                            <button onclick="editKategoria(${item.id})" style="background-color: #f39c12;">Szerkeszt</button>
                            <button onclick="deleteKategoria(${item.id})" style="background-color: #e74c3c;">Töröl</button>
                        </div>
                    </li>
                `;
            });
        }

        async function addKategoria() {
            const nev = document.getElementById('kategoriaNev').value.trim();
            if (!nev) return alert('Kérlek, adj meg egy érvényes kategória nevet!');
            
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nev: nev })
            });
            document.getElementById('kategoriaNev').value = '';
            loadData();
        }

        async function editKategoria(id) {
            const currentName = document.getElementById(`text-${id}`).innerText;
            const newName = prompt("Új név:", currentName);
            
            if (newName !== null && newName.trim() !== "" && newName.trim() !== currentName) {
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, nev: newName.trim() })
                });
                loadData();
            } else if (newName !== null && newName.trim() === "") {
                alert('A kategória neve nem lehet üres!');
            }
        }

        async function deleteKategoria(id) {
            if (confirm("Biztosan törlöd?")) {
                await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
                loadData();
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
